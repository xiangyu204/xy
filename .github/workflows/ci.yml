# Workflow 이름 (GitHub Actions 탭에 표시됩니다)
name: CI Pipeline

# 이 Workflow를 실행시키는 조건
on:
  push:
    branches: [ main, develop ]    # main 또는 develop에 push 시
  pull_request:
    branches: [ main, develop ]    # PR 생성/업데이트 시

jobs:
  # ── Job 1: 백엔드 빌드 & 테스트 ──
  backend-ci:
    runs-on: ubuntu-latest         # 우분투 환경에서 실행
    steps:
      # 저장소 코드를 가져옵니다
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # Java 17 환경을 설치합니다
      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
            # 🔥 关键：给 mvnw 权限
           - name: 권한 설정
           run: chmod +x backend/mvnw

      # Maven으로 빌드 및 테스트 실행
      - name: Maven 빌드 & 테스트
        run: |
          cd backend
          ./mvnw clean package -DskipTests  # Test실행은 skip

  # ── Job 2: 프론트엔드 빌드 ──
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 의존성 설치 & 빌드
        run: |
          cd frontend
          npm install
          npm run build